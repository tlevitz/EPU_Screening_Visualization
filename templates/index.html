<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select Session</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 1rem; }
    h1 { margin-bottom: 0.5rem; }
    .controls { margin-bottom: 0.75rem; }
    input[type=text] { padding: 0.5rem; width: 20rem; }
    .list {
      max-height: 60vh;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 0.5rem;
    }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px dashed #eee;
      font-size: 14px;
    }
    .item:last-child { border-bottom: none; }
    .name {
      font-family: monospace;
      color: #0366d6;
      text-decoration: none;
      padding: 0.2rem 0.3rem;
      border-radius: 3px;
    }
    .name:hover {
      background: #f0f8ff;
      text-decoration: underline;
    }
    .meta {
      color: #666;
      font-size: 12px;
      margin-left: 0.5rem;
      white-space: nowrap;
    }
    .btn {
      display: inline-block;
      padding: 0.5rem 0.8rem;
      font-size: 14px;
      line-height: 1.2;
      font-family: Arial, sans-serif;
      text-decoration: none;
      color: #000;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      vertical-align: middle;
      box-sizing: border-box;
      margin-top: 0.75rem;
    }
    .btn:hover { background: #e9e9e9; }
    .empty { color: #999; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Select a session under {{ base_root }} </h1>


  <div class="controls">
    <label for="filter">Filter: </label>
    <input type="text" id="filter" placeholder="Type to filter list...">
  </div>


  <div class="list" id="session-list">
    {% if sessions %}
      {% for s in sessions %}
        <div class="item" data-name="{{ s.name }}">
          <div>
            <a class="name" href="{{ url_for('session_view', session_id=s.id) }}">{{ s.name }}</a>
          </div>
        </div>
      {% endfor %}
    {% else %}
      <div class="empty">No sessions found under {{ base_root }}.</div>
    {% endif %}
  </div>


  <a class="btn" href="/">Refresh</a>


  <script>
    const filterInput = document.getElementById('filter');
    const list = document.getElementById('session-list');
    filterInput.addEventListener('input', function() {
      const q = this.value.toLowerCase();
      for (const item of list.querySelectorAll('.item')) {
        const name = item.getAttribute('data-name').toLowerCase();
        item.style.display = name.includes(q) ? '' : 'none';
      }
    });
  </script>
</body>
</html>
